global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: imagiverse-api
    static_configs:
      - targets: ['api:3000']

  - job_name: imagiverse-worker
    static_configs:
      - targets: ['worker:3001']

  # Prometheus monitors itself so its own health is visible in the UI.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
