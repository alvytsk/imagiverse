name: imagiverse

# ============================================================================
# Local Development Environment
# Services: PostgreSQL, Redis, Garage v2 (S3-compatible)
#
# Typical dev workflow — run infra only, API + SPA natively:
#   npm run infra:up          # starts postgres, redis, garage
#   npm run dev:api           # starts API with hot reload (tsx watch)
#   npm run dev:worker        # starts worker with hot reload
#
# Or run the full stack in Docker:
#   docker compose up
#
# First-time Garage setup (run once after garage container is healthy):
#   docker compose run --rm garage-init
# ============================================================================

services:
  # ========================================================================
  # Client — nginx serves the React SPA and proxies /api to Fastify
  # ========================================================================
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
      target: production
    container_name: imagiverse-client

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - api

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # Fastify API Server
  # ========================================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: imagiverse-api

    restart: unless-stopped

    environment:
      NODE_ENV: development
      DEBUG: "imagiverse:*"

      # Database — direct connection (no PgBouncer in dev)
      DATABASE_URL: "postgresql://imagiverse_user:imagiverse_password@postgres:5432/imagiverse"

      # Redis
      REDIS_URL: "redis://redis:6379"

      # S3 (Garage v2) — access key and secret are injected via /shared/s3-credentials.env
      S3_ENDPOINT: "http://garage:3900"
      S3_PUBLIC_ENDPOINT: "http://localhost:3900"
      S3_BUCKET: "imagiverse-media"
      S3_REGION: "us-east-1"
      S3_USE_SSL: "false"

      # JWT
      JWT_SECRET: "dev-jwt-secret-change-in-production-must-be-32"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-in-production-32"

      # Server
      API_PORT: "3000"
      API_HOST: "0.0.0.0"

    ports:
      - "9229:9229"   # Node.js debug port
    expose:
      - "3000"

    volumes:
      - ../server/src:/app/server/src:ro
      - ../shared/src:/app/shared/src:ro
      - s3_credentials:/shared:ro

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # BullMQ Worker (Image Processing, Async Tasks)
  # ========================================================================
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      target: production
    container_name: imagiverse-worker

    restart: unless-stopped

    environment:
      NODE_ENV: development
      DEBUG: "imagiverse:*"

      # Database — direct connection (no PgBouncer in dev)
      DATABASE_URL: "postgresql://imagiverse_user:imagiverse_password@postgres:5432/imagiverse"

      # Redis
      REDIS_URL: "redis://redis:6379"

      # S3 (Garage v2) — access key and secret are injected via /shared/s3-credentials.env
      S3_ENDPOINT: "http://garage:3900"
      S3_PUBLIC_ENDPOINT: "http://localhost:3900"
      S3_BUCKET: "imagiverse-media"
      S3_REGION: "us-east-1"
      S3_USE_SSL: "false"

      # JWT (needed if worker validates tokens)
      JWT_SECRET: "dev-jwt-secret-change-in-production-must-be-32"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-in-production-32"

      # Worker
      WORKER_PORT: "3001"
      WORKER_CONCURRENCY: "3"

    ports:
      - "3001:3001"

    volumes:
      - ../server/src:/app/server/src:ro
      - ../shared/src:/app/shared/src:ro
      - s3_credentials:/shared:ro

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # PostgreSQL 16 Database
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: imagiverse-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: imagiverse
      POSTGRES_USER: imagiverse_user
      POSTGRES_PASSWORD: imagiverse_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: UTC

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagiverse_user -d imagiverse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # Redis 7 (Cache, Sessions, BullMQ Queue)
  # appendonly yes ensures BullMQ jobs survive Redis restarts.
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: imagiverse-redis

    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
      --maxmemory 512mb
      --maxmemory-policy noeviction

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # Garage v2 (S3-Compatible Object Storage)
  # ========================================================================
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: imagiverse-garage

    restart: unless-stopped

    environment:
      GARAGE_ADMIN_TOKEN: "dev-admin-token-change-in-production"

    command: ["/garage", "-c", "/etc/garage/garage.toml", "server"]

    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # RPC (inter-node, not needed externally in dev)
      - "3902:3902"   # Admin API

    volumes:
      - garage_data:/tmp/garage
      - ./garage.toml:/etc/garage/garage.toml:ro

    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage/garage.toml", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # Prometheus (metrics scraper + alerting rules)
  # UI available at http://localhost:9090
  # Scrapes api:3000/metrics and worker:3001/metrics every 15 s.
  # ========================================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: imagiverse-prometheus

    restart: unless-stopped

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus

    depends_on:
      - api
      - worker

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # Grafana (dashboard UI)
  # UI available at http://localhost:3003  (admin / admin)
  # Auto-provisioned datasource: Prometheus
  # Auto-provisioned dashboard:  Imagiverse Overview
  #
  # Dashboard persistence:
  #   - grafana_data volume stores Grafana's SQLite DB (survives "docker compose down")
  #   - Provisioned JSON files (docker/grafana/dashboards/) are the source of truth
  #   - DO NOT run "docker compose down -v" — that destroys all volumes including
  #     grafana_data, losing any dashboards created via the UI
  #   - UI edits to provisioned dashboards are stored in the DB and survive restarts,
  #     but are overwritten if the corresponding JSON file changes on disk
  # ========================================================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: imagiverse-grafana

    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/dashboards/imagiverse-overview.json"

    ports:
      - "3003:3000"

    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    depends_on:
      prometheus:
        condition: service_started

    networks:
      - imagiverse-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # Garage Init (one-shot: creates bucket + access key)
  # Runs once after Garage is healthy, then exits.
  # API and Worker depend on this completing before they start.
  # ========================================================================
  garage-init:
    image: alpine:3.21
    container_name: imagiverse-garage-init

    restart: "no"

    environment:
      GARAGE_ADMIN_URL: "http://garage:3902"
      GARAGE_ADMIN_TOKEN: "dev-admin-token-change-in-production"
      S3_BUCKET: "imagiverse-media"
      S3_KEY_NAME: "dev-key"

    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl > /dev/null 2>&1 && sh /garage-init.sh"]

    volumes:
      - ./garage-init.sh:/garage-init.sh:ro
      - s3_credentials:/shared

    depends_on:
      garage:
        condition: service_healthy

    networks:
      - imagiverse-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  garage_data:
    driver: local
  s3_credentials:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  imagiverse-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
