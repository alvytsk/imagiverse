# Security headers — included in every location block that uses add_header
# (nginx's add_header in a location block replaces parent-level add_header)

# CSP: allow self + Google Fonts + inline theme script (by hash)
add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'sha256-GRTJ+JATMmW2hiTUJK8h3C8qPzr4T2oD6BxTxkxzFy8='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    always;
add_header X-Content-Type-Options  "nosniff" always;
add_header X-Frame-Options         "DENY" always;
add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
