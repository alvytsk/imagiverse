version: '3.8'

# ============================================================================
# Docker Compose overrides for CI/CD testing
# Extends docker-compose.yml with CI-specific settings:
#   - No source volume mounts (immutable image builds)
#   - Faster healthcheck intervals
#   - No persistent volumes (ephemeral CI runs)
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml up
# ============================================================================

services:
  # ========================================================================
  # API — CI overrides
  # ========================================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: production

    volumes: []

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ========================================================================
  # Worker — CI overrides
  # ========================================================================
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      target: production

    volumes: []

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully

  # ========================================================================
  # PostgreSQL — CI optimizations
  # ========================================================================
  postgres:
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagiverse_user -d imagiverse"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ========================================================================
  # Redis — CI optimizations
  # ========================================================================
  redis:
    volumes: []

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ========================================================================
  # Garage v2 — CI optimizations
  # ========================================================================
  garage:
    volumes:
      - ./garage.toml:/etc/garage/garage.toml:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3902/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # ========================================================================
  # Garage Init — CI (no volume, shorter timeout)
  # ========================================================================
  garage-init:
    volumes:
      - ./garage-init.sh:/garage-init.sh:ro
      - ./garage.toml:/etc/garage/garage.toml:ro
