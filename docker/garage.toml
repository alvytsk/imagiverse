# Garage v2 Configuration — Development / Single-Node
#
# For production, replace db_engine with "lmdb", use persistent volumes,
# generate a real rpc_secret (openssl rand -hex 32), and configure
# rpc_public_addr to the actual node's reachable address.

# ── Data directories ──────────────────────────────────────────────────────────
metadata_dir = "/tmp/garage/meta"

[data]
data_dir = "/tmp/garage/data"

# ── Metadata DB ───────────────────────────────────────────────────────────────
[db]
# Use SQLite for development (fast startup, zero config).
# Use "lmdb" for production (better performance, concurrent reads).
engine = "sqlite"

# ── RPC (inter-node communication) ───────────────────────────────────────────
# Required even for a single-node cluster.
# In Docker Compose, other containers reach this node as "garage:3901".
rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"

# IMPORTANT: In production, generate with: openssl rand -hex 32
# This value is intentionally weak — change before any non-dev deployment.
rpc_secret = "b01b1a9c3f7e2d4a5c6e8f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0"

# ── S3 API ────────────────────────────────────────────────────────────────────
[s3_api]
s3_region = "us-east-1"
api_bind_addr = "[::]:3900"
# root_domain is used for virtual-hosted-style bucket URLs (e.g., bucket.garage).
# We use path-style (forcePathStyle: true in the S3 client), so this is informational.
root_domain = ".garage.local"

# ── Admin API ─────────────────────────────────────────────────────────────────
[admin]
api_bind_addr = "[::]:3902"
# Bearer token required for all admin API requests.
# Set via GARAGE_ADMIN_TOKEN env var in Docker Compose.
